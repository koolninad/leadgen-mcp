version: "3.8"

services:
  whodat:
    image: lissy93/who-dat:latest
    container_name: whodat
    ports:
      - "8890:8890"
    environment:
      - PORT=8890
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8890/example.com"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
